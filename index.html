<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Nunito', sans-serif; }
#scene { position: relative; width: 100%; height: 100%; }
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
canvas.active { pointer-events: auto; }
#text-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; text-align: center; }
h1 { font-size: clamp(2rem, 6vw, 4.5rem); font-weight: 700; color: #222; display: inline-block; white-space: nowrap; }
#casual { animation: wobble 3s ease-in-out infinite; }
#pro { opacity: 0; font-family: 'Nunito', sans-serif; letter-spacing: 0.04em; display: none; }
#pro .glow { text-shadow: 0 0 30px rgba(99, 102, 241, 0.25); }
.letter { display: inline-block; transition: opacity 0.3s; }
.letter.falling { position: absolute; animation: none; z-index: 3; }
@keyframes wobble { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-4px) rotate(-0.5deg); } 75% { transform: translateY(4px) rotate(0.5deg); } }
#hint { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); font-size: 0.9rem; color: #aaa; z-index: 1; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="scene">
  <canvas id="canvas"></canvas>
  <div id="text-layer">
    <h1>
      <span id="casual">Hatcher is cool, <span id="iguess"><span class="letter" data-letter="I">I</span> <span class="letter" data-letter="g">g</span><span class="letter" data-letter="u">u</span><span class="letter" data-letter="e">e</span><span class="letter" data-letter="s">s</span><span class="letter" data-letter="s">s</span></span><span id="period">.</span></span>
      <span id="pro"><span class="glow">Hatcher is cool!</span></span>
    </h1>
  </div>
  <div id="hint">click anywhere</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const casual = document.getElementById('casual');
const pro = document.getElementById('pro');
const iguess = document.getElementById('iguess');
const period = document.getElementById('period');

let W, H, dpr;
let particles = [];
let dragging = null;
let dragOffX = 0, dragOffY = 0;
let activated = false;

const COLORS = [
  '#f472b6', '#a78bfa', '#60a5fa', '#34d399', '#fbbf24',
  '#fb923c', '#f87171', '#c084fc', '#22d3ee', '#e879f9'
];

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

class Ball {
  constructor(x, y, vx, vy, r, color) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.r = r;
    this.color = color;
    this.grounded = false;
  }
  update(dt) {
    if (this === dragging) return;
    this.vy += 1200 * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vx *= 0.998;
    if (this.y + this.r > H) {
      this.y = H - this.r;
      this.vy *= -0.5;
      this.vx *= 0.85;
      if (Math.abs(this.vy) < 30) { this.vy = 0; this.grounded = true; }
    }
    if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.5; }
    if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.7; }
    if (this.x + this.r > W) { this.x = W - this.r; this.vx *= -0.7; }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x - this.r * 0.25, this.y - this.r * 0.25, this.r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();
  }
}

function collideBalls() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.r + b.r;
      if (dist < minDist && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;
        const relVx = a.vx - b.vx, relVy = a.vy - b.vy;
        const dot = relVx * nx + relVy * ny;
        if (dot > 0) {
          a.vx -= dot * nx * 0.5;
          a.vy -= dot * ny * 0.5;
          b.vx += dot * nx * 0.5;
          b.vy += dot * ny * 0.5;
        }
      }
    }
  }
}

function spawnBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 350;
    const r = 5 + Math.random() * 12;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    particles.push(new Ball(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed - 200, r, color));
  }
}

function shatterLetter(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  el.style.opacity = '0';
  spawnBurst(cx, cy, 5 + Math.floor(Math.random() * 4));
}

function activate() {
  if (activated) return;
  activated = true;
  hint.style.transition = 'opacity 0.5s';
  hint.style.opacity = '0';
  setTimeout(() => hint.style.display = 'none', 500);

  const letters = iguess.querySelectorAll('.letter');
  let delay = 0;
  letters.forEach((el, i) => {
    if (el.dataset.letter === ' ') return;
    setTimeout(() => shatterLetter(el), delay);
    delay += 100;
  });

  setTimeout(() => {
    period.style.transition = 'opacity 0.3s';
    period.style.opacity = '0';
  }, delay);

  setTimeout(() => {
    casual.style.transition = 'opacity 0.4s';
    casual.style.opacity = '0';
    setTimeout(() => {
      casual.style.display = 'none';
      pro.style.display = 'inline';
      requestAnimationFrame(() => {
        pro.style.transition = 'opacity 0.6s';
        pro.style.opacity = '1';
      });
    }, 400);
  }, delay + 200);

  canvas.classList.add('active');
}

function getPointer(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onDown(e) {
  if (!activated) { activate(); return; }
  const p = getPointer(e);
  for (let i = particles.length - 1; i >= 0; i--) {
    const b = particles[i];
    const dx = p.x - b.x, dy = p.y - b.y;
    if (dx * dx + dy * dy < b.r * b.r * 2.5) {
      dragging = b;
      dragOffX = dx;
      dragOffY = dy;
      e.preventDefault();
      return;
    }
  }
}

function onMove(e) {
  if (!dragging) return;
  const p = getPointer(e);
  dragging.x = p.x - dragOffX;
  dragging.y = p.y - dragOffY;
  e.preventDefault();
}

function onUp(e) {
  if (dragging) {
    dragging.vx = 0;
    dragging.vy = 0;
    dragging = null;
  }
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);

document.getElementById('scene').addEventListener('click', (e) => {
  if (!activated) activate();
});

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) p.update(dt);
  collideBalls();
  for (const p of particles) p.draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
