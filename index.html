<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hatcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Nunito', sans-serif;
    }

    body.activated {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a5e 40%, #2563eb 100%);
    }

    .content {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* Main text — casual mode */
    .text-casual {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #333;
      transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      animation: wobble 3s ease-in-out infinite;
      line-height: 1.4;
    }

    body.activated .text-casual {
      opacity: 0;
      transform: scale(0.95);
    }

    /* Main text — professional mode */
    .text-pro {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: scale(0.8);
      transition: all 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
      text-shadow: 0 0 40px rgba(37, 99, 235, 0.5), 0 0 80px rgba(37, 99, 235, 0.2);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      white-space: nowrap;
    }

    body.activated .text-pro {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* Tagline */
    .tagline {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s cubic-bezier(0.4, 0, 0.2, 1) 1s;
      position: absolute;
      top: calc(50% + 3rem);
      left: 50%;
      transform: translate(-50%, 20px);
      white-space: nowrap;
    }

    body.activated .tagline {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* Click hint */
    .hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.1em;
      animation: pulse 2s ease-in-out infinite;
      transition: opacity 0.6s ease;
      z-index: 3;
    }

    body.activated .hint {
      opacity: 0;
      pointer-events: none;
    }

    /* Sparkle particles */
    .sparkle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      z-index: 10;
      animation: sparkle-fly 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Floating shapes */
    .floating-shape {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 2s ease 0.5s;
    }

    body.activated .floating-shape {
      opacity: 1;
      animation: float-drift linear infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-4px) rotate(-0.5deg); }
      75% { transform: translateY(4px) rotate(0.5deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    @keyframes sparkle-fly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    @keyframes float-drift {
      0% { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-20vh) rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .text-pro { font-size: 2rem; }
      .tagline { font-size: 0.75rem; top: calc(50% + 2.2rem); }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="text-casual">Hatcher is cool, I guess.</div>
    <div class="text-pro">Hatcher is cool!</div>
  </div>
  <div class="tagline">Transforming developer workflows</div>
  <div class="hint">click anywhere</div>

  <script>
    let activated = false;

    document.body.addEventListener('click', function(e) {
      if (activated) return;
      activated = true;

      // Trigger the transformation
      document.body.classList.add('activated');

      // Spawn sparkles at click point
      for (let i = 0; i < 24; i++) {
        spawnSparkle(e.clientX, e.clientY);
      }

      // Spawn floating shapes after a beat
      setTimeout(spawnShapes, 800);
    });

    function spawnSparkle(cx, cy) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';

      const size = Math.random() * 6 + 2;
      const angle = Math.random() * Math.PI * 2;
      const distance = Math.random() * 200 + 80;
      const tx = Math.cos(angle) * distance;
      const ty = Math.sin(angle) * distance;

      const colors = ['#2563eb', '#60a5fa', '#93c5fd', '#ffffff', '#c4b5fd', '#818cf8'];
      const color = colors[Math.floor(Math.random() * colors.length)];

      sparkle.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        width: ${size}px; height: ${size}px;
        background: ${color};
        box-shadow: 0 0 ${size * 2}px ${color};
        --tx: ${tx}px; --ty: ${ty}px;
      `;

      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 1200);
    }

    function spawnShapes() {
      const shapes = [
        { type: 'circle', size: 60, color: 'rgba(37, 99, 235, 0.08)' },
        { type: 'circle', size: 40, color: 'rgba(96, 165, 250, 0.06)' },
        { type: 'circle', size: 80, color: 'rgba(139, 92, 246, 0.05)' },
        { type: 'diamond', size: 30, color: 'rgba(37, 99, 235, 0.1)' },
        { type: 'diamond', size: 20, color: 'rgba(96, 165, 250, 0.08)' },
        { type: 'circle', size: 50, color: 'rgba(255, 255, 255, 0.04)' },
        { type: 'diamond', size: 35, color: 'rgba(139, 92, 246, 0.06)' },
      ];

      shapes.forEach((shape, i) => {
        const el = document.createElement('div');
        el.className = 'floating-shape';

        const left = Math.random() * 100;
        const duration = Math.random() * 15 + 15;
        const delay = Math.random() * 5;

        if (shape.type === 'circle') {
          el.style.cssText = `
            left: ${left}%;
            width: ${shape.size}px;
            height: ${shape.size}px;
            border-radius: 50%;
            border: 1px solid ${shape.color};
            background: ${shape.color.replace(/[\d.]+\)$/, '0.02)')};
            animation-duration: ${duration}s;
            animation-delay: ${delay}s;
          `;
        } else {
          el.style.cssText = `
            left: ${left}%;
            width: ${shape.size}px;
            height: ${shape.size}px;
            transform: rotate(45deg);
            border: 1px solid ${shape.color};
            background: ${shape.color.replace(/[\d.]+\)$/, '0.03)')};
            animation-duration: ${duration}s;
            animation-delay: ${delay}s;
          `;
        }

        document.body.appendChild(el);
      });
    }
  </script>
</body>
</html>
