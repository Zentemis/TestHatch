<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:#fff;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;position:relative;transition:background 0.5s ease}
body.dark{background:#2a2a2a}
.container{text-align:center;position:relative;z-index:2}
h1{font-size:3.5rem;font-weight:700;color:#222;letter-spacing:0;transition:color 0.5s ease}
body.dark h1{color:#fff}
body.active h1{animation:none}
.text-casual{transition:opacity 0.6s ease}
body.active .text-casual{opacity:0;position:absolute;left:-9999px}
.text-pro{opacity:0;position:absolute;left:-9999px;transition:opacity 0.6s ease 0.8s}
body.active .text-pro{opacity:1;position:relative;left:auto;animation:pop 0.4s ease 1s both}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes wobble{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-6px) rotate(-1deg)}75%{transform:translateY(4px) rotate(0.5deg)}}
.text-casual .text-inner{animation:wobble 4s ease-in-out infinite}
.hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:#aaa;font-size:0.95rem;transition:opacity 1s ease;animation:pulse 2s ease-in-out infinite;pointer-events:none}
body.dark .hint{color:#666}
body.active .hint{opacity:0}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
.tagline{opacity:0;transform:translateY(20px);color:#666;font-size:1.2rem;margin-top:24px;letter-spacing:1px;transition:all 1s ease 0.8s}
body.dark .tagline{color:rgba(255,255,255,0.6)}
body.active .tagline{opacity:1;transform:translateY(0)}
canvas#physics{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
canvas#physics.interactive{pointer-events:auto}
#darkBtn{position:fixed;top:20px;right:20px;z-index:20;width:44px;height:44px;border-radius:50%;border:2px solid #ccc;background:#fff;color:#333;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease}
body.dark #darkBtn{background:#444;border-color:#666;color:#fff}
</style>
</head>
<body>
<button id="darkBtn" title="Toggle dark mode">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>
<canvas id="physics"></canvas>
<div class="container">
<h1>
<span class="text-casual"><span class="text-inner">Hatcher is cool, I guess.</span></span>
<span class="text-pro">Hatcher is cool!</span>
</h1>
<p class="tagline">Transforming developer workflows</p>
</div>
<div class="hint">click anywhere</div>
<script>
let clicked=false;
const canvas=document.getElementById('physics');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

const colors=['#ff6b9d','#c44dff','#4da6ff','#ff9f43','#54a0ff','#5f27cd','#ff6348','#00d2d3','#ff9ff3','#f368e0','#0abde3','#10ac84'];
let balls=[];
let dragBall=null;
let lastMouse={x:0,y:0};

document.getElementById('darkBtn').addEventListener('click',function(e){
  e.stopPropagation();
  document.body.classList.toggle('dark');
});

document.body.addEventListener('click',function(e){
  if(clicked)return;
  clicked=true;
  document.body.classList.add('active');
  shatter();
});

function shatter(){
  const casualText=document.querySelector('.text-casual');
  const text=Array.from('I guess');
  const rect=casualText.getBoundingClientRect();
  const charW=rect.width/text.length;
  const startX=rect.left;
  const startY=rect.top+rect.height/2;

  text.forEach(function(ch,i){
    if(ch===' ')return;
    const lx=startX+i*charW+charW/2;
    const ly=startY;
    const numBalls=4+Math.floor(Math.random()*5);
    for(let j=0;j<numBalls;j++){
      const angle=Math.random()*Math.PI*2;
      const speed=Math.random()*2+1;
      balls.push({
        x:lx+Math.random()*10-5,
        y:ly+Math.random()*10-5,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed-3,
        r:4+Math.random()*5,
        color:colors[Math.floor(Math.random()*colors.length)],
        grounded:false
      });
    }
  });
}

canvas.addEventListener('mousedown',function(e){
  if(balls.length===0)return;
  dragBall=findBall(e.clientX,e.clientY);
  if(dragBall){
    lastMouse={x:e.clientX,y:e.clientY};
    canvas.classList.add('interactive');
  }
});
canvas.addEventListener('mousemove',function(e){
  if(!dragBall)return;
  const dx=e.clientX-dragBall.x;
  const dy=e.clientY-dragBall.y;
  dragBall.x=e.clientX;
  dragBall.y=e.clientY;
  lastMouse={x:e.clientX,y:e.clientY};
  dragBall.grounded=false;
});
canvas.addEventListener('mouseup',function(e){
  if(dragBall){
    dragBall=null;
    canvas.classList.remove('interactive');
  }
});

canvas.addEventListener('touchstart',function(e){
  if(balls.length===0)return;
  const t=e.touches[0];
  dragBall=findBall(t.clientX,t.clientY);
  if(dragBall){
    lastMouse={x:t.clientX,y:t.clientY};
    canvas.classList.add('interactive');
  }
},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(!dragBall)return;
  const t=e.touches[0];
  dragBall.x=t.clientX;
  dragBall.y=t.clientY;
  lastMouse={x:t.clientX,y:t.clientY};
  dragBall.grounded=false;
},{passive:true});
canvas.addEventListener('touchend',function(){
  if(dragBall){
    dragBall=null;
    canvas.classList.remove('interactive');
  }
});

function findBall(mx,my){
  let closest=null;
  let minD=30;
  for(const b of balls){
    const d=Math.hypot(mx-b.x,my-b.y);
    if(d<minD){minD=d;closest=b;}
  }
  return closest;
}

const gravity=0.35;
const bounce=0.6;
const friction=0.995;

function animate(){
  requestAnimationFrame(animate);
  ctx.clearRect(0,0,W,H);

  for(const b of balls){
    if(b===dragBall)continue;
    b.vy+=gravity;
    b.vx*=friction;
    b.vy*=friction;
    b.x+=b.vx;
    b.y+=b.vy;

    if(b.x-b.r<0){b.x=b.r;b.vx*=-bounce;}
    if(b.x+b.r>W){b.x=W-b.r;b.vx*=-bounce;}
    if(b.y+b.r>H){
      b.y=H-b.r;
      b.vy*=-bounce;
      b.vx*=0.95;
      if(Math.abs(b.vy)<1)b.vy=0;
      b.grounded=true;
    }
    if(b.y-b.r<0){b.y=b.r;b.vy*=-bounce;}
  }

  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      const a=balls[i],b=balls[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const dist=Math.hypot(dx,dy);
      const minDist=a.r+b.r;
      if(dist<minDist&&dist>0){
        const nx=dx/dist,ny=dy/dist;
        const overlap=(minDist-dist)/2;
        a.x-=nx*overlap;a.y-=ny*overlap;
        b.x+=nx*overlap;b.y+=ny*overlap;
        const relVx=a.vx-b.vx,relVy=a.vy-b.vy;
        const dot=relVx*nx+relVy*ny;
        if(dot>0){
          a.vx-=dot*nx*0.5;a.vy-=dot*ny*0.5;
          b.vx+=dot*nx*0.5;b.vy+=dot*ny*0.5;
        }
      }
    }
  }

  for(const b of balls){
    ctx.globalAlpha=0.9;
    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.3,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}
animate();
</script>
</body>
</html>
