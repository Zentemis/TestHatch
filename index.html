<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e27;font-family:'Nunito',sans-serif}

#ai-frame{
  position:fixed;inset:0;z-index:0;width:100%;height:100%;border:none;
  opacity:0;transition:opacity .8s ease .4s;pointer-events:none
}
#ai-frame.show{opacity:1;pointer-events:auto}

#overlay{
  position:fixed;inset:0;z-index:10;background:#fff;overflow:hidden
}
body.split #overlay{pointer-events:none}

/* Each half is 50% wide. When split, content at 200%-width gets clipped by overflow:hidden */
body.split #overlay>.half{
  position:absolute;top:0;width:50%;height:100%;overflow:hidden;
  transition:transform 1.2s cubic-bezier(.77,0,.18,1)
}
body.split #overlay>.half.l{left:0;background:#fff}
body.split #overlay>.half.r{left:50%;background:#fff}
body.split .half.l{transform:translateX(-100%)}
body.split .half.r{transform:translateX(100%)}

#overlay canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none
}
#overlay canvas.grab{pointer-events:auto}

#scene-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:1;text-align:center;pointer-events:none
}
h1{font-size:clamp(2rem,6vw,4.5rem);font-weight:700;color:#222;display:inline-block;white-space:nowrap}
#casual{animation:wobble 3s ease-in-out infinite}
#pro{opacity:0;display:none}
#pro .glow{text-shadow:0 0 30px rgba(99,102,241,.25)}
.letter{display:inline-block;transition:opacity .3s}
@keyframes wobble{0%,100%{transform:translateY(0)rotate(0deg)}25%{transform:translateY(-4px)rotate(-.5deg)}75%{transform:translateY(4px)rotate(.5deg)}}

#hint{
  position:absolute;bottom:8%;left:50%;transform:translateX(-50%);
  font-size:.9rem;color:#aaa;z-index:1;animation:pulse 2s ease-in-out infinite;
  pointer-events:none;white-space:nowrap
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

#darkBtn{
  position:fixed;top:20px;right:20px;z-index:20;width:44px;height:44px;border-radius:50%;
  border:2px solid #ccc;background:#fff;color:#333;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
body.split #darkBtn,body.split #egg-counter{display:none}

#egg-counter{
  position:fixed;top:20px;left:20px;z-index:20;
  background:rgba(0,0,0,.65);color:#fff;padding:6px 14px;border-radius:20px;
  font-size:.8rem;font-family:'Nunito',sans-serif;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap
}
#egg-counter.show{opacity:1}
</style>
</head>
<body>

<div id="egg-counter"></div>
<button id="darkBtn" title="Toggle dark mode">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<iframe id="ai-frame" src="ai-site/index.html"></iframe>

<div id="overlay">
  <canvas id="c"></canvas>
  <div id="scene-text">
    <h1>
      <span id="casual">Hatcher is cool, <span id="iguess"><span class="letter">I</span> <span class="letter">g</span><span class="letter">u</span><span class="letter">e</span><span class="letter">s</span><span class="letter">s</span></span><span id="period">.</span></span>
      <span id="pro"><span class="glow">Hatcher is cool!</span></span>
    </h1>
  </div>
  <div id="hint">click anywhere</div>
</div>

<script>
// === SETUP ===
const c=document.getElementById('c'),cx=c.getContext('2d');
const hint=document.getElementById('hint'),casual=document.getElementById('casual');
const pro=document.getElementById('pro'),iguess=document.getElementById('iguess');
const period=document.getElementById('period'),darkBtn=document.getElementById('darkBtn');
const eggBadge=document.getElementById('egg-counter'),overlay=document.getElementById('overlay');
const aiFrame=document.getElementById('ai-frame');

let W,H,dpr,pts=[],drag=null,offX=0,offY=0,act=false;
let px=null,pt=0,tvx=0,tvy=0,aid=null;
const COLS=['#f472b6','#a78bfa','#60a5fa','#34d399','#fbbf24','#fb923c','#f87171','#c084fc','#22d3ee','#e879f9'];

function resize(){
  dpr=window.devicePixelRatio||1;W=innerWidth;H=innerHeight;
  c.width=W*dpr;c.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);
}
resize();addEventListener('resize',resize);

class Ball{
  constructor(x,y,vx,vy,r,color){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.r=r;this.color=color;}
  update(dt){
    if(this===drag)return;
    this.vy+=1200*dt;this.x+=this.vx*dt;this.y+=this.vy*dt;this.vx*=.998;
    if(this.y+this.r>H){this.y=H-this.r;this.vy*=-.5;this.vx*=.85;if(Math.abs(this.vy)<30)this.vy=0;}
    if(this.y-this.r<0){this.y=this.r;this.vy*=-.5;}
    if(this.x-this.r<0){this.x=this.r;this.vx*=-.7;}
    if(this.x+this.r>W){this.x=W-this.r;this.vx*=-.7;}
  }
  draw(){cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.fillStyle=this.color;cx.fill();
    cx.beginPath();cx.arc(this.x-this.r*.25,this.y-this.r*.25,this.r*.35,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,.35)';cx.fill();}
}

function collide(){
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    const a=pts[i],b=pts[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
    if(d<md&&d>0){const nx=dx/d,ny=dy/d,o=md-d;
      a.x-=nx*o*.5;a.y-=ny*o*.5;b.x+=nx*o*.5;b.y+=ny*o*.5;
      const rvx=a.vx-b.vx,rvy=a.vy-b.vy,dot=rvx*nx+rvy*ny;
      if(dot>0){a.vx-=dot*nx*.5;a.vy-=dot*ny*.5;b.vx+=dot*nx*.5;b.vy+=dot*ny*.5;}
    }
  }
}

function burst(x,y,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=80+Math.random()*350;pts.push(new Ball(x,y,Math.cos(a)*s,Math.sin(a)*s-200,5+Math.random()*12,COLS[Math.floor(Math.random()*COLS.length)]));}}

function activate(){
  if(act)return;act=true;
  hint.style.transition='opacity .5s';hint.style.opacity='0';setTimeout(()=>hint.style.display='none',500);
  const ls=iguess.querySelectorAll('.letter');let d=0;
  ls.forEach(el=>{setTimeout(()=>{const r=el.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2,5+Math.random()*4|0);el.style.opacity='0';},d);d+=100;});
  setTimeout(()=>{period.style.transition='opacity .3s';period.style.opacity='0';},d);
  setTimeout(()=>{casual.style.transition='opacity .4s';casual.style.opacity='0';setTimeout(()=>{casual.style.display='none';pro.style.display='inline';requestAnimationFrame(()=>{pro.style.transition='opacity .6s';pro.style.opacity='1';});},400);},d+200);
  c.classList.add('grab');
}

function gp(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}

function onDown(e){
  if(!act){activate();return;}const p=gp(e);
  for(let i=pts.length-1;i>=0;i--){const b=pts[i],dx=p.x-b.x,dy=p.y-b.y;
    if(dx*dx+dy*dy<b.r*b.r*2.5){drag=b;offX=dx;offY=dy;px={x:p.x,y:p.y};pt=performance.now();tvx=0;tvy=0;e.preventDefault();return;}}
}
function onMove(e){
  if(!drag)return;const p=gp(e),n=performance.now(),dt=Math.min((n-pt)/1000,.1);
  if(dt>.001){tvx=(p.x-px.x)/dt;tvy=(p.y-px.y)/dt;}
  px={x:p.x,y:p.y};pt=n;drag.x=p.x-offX;drag.y=p.y-offY;e.preventDefault();
}
function onUp(e){if(drag){drag.vx=tvx*.25;drag.vy=tvy*.25;drag=null;tvx=0;tvy=0;}}

c.addEventListener('mousedown',onDown);
c.addEventListener('mousemove',onMove);
c.addEventListener('mouseup',onUp);
c.addEventListener('touchstart',onDown,{passive:false});
c.addEventListener('touchend',onUp);

let lt=performance.now();
function loop(n){const dt=Math.min((n-lt)/1000,.05);lt=n;
  cx.clearRect(0,0,W,H);for(const p of pts)p.update(dt);collide();for(const p of pts)p.draw();
  aid=requestAnimationFrame(loop);
}
aid=requestAnimationFrame(loop);

darkBtn.addEventListener('click',e=>{e.stopPropagation();document.body.classList.toggle('dark')});

// === EASTER EGG ===
let clickCount=0;

overlay.addEventListener('click',function(e){
  if(document.body.classList.contains('split'))return;
  clickCount++;
  if(!act)activate();
  eggBadge.textContent=clickCount+' / 5';
  eggBadge.classList.add('show');
  clearTimeout(window._et);
  if(clickCount<5)window._et=setTimeout(()=>eggBadge.classList.remove('show'),1500);
  else{
    eggBadge.textContent='\u2713 5/5 \u2014 hold Shift + press A';
    window._et=setTimeout(()=>eggBadge.classList.remove('show'),2500);
  }
});

document.addEventListener('keydown',function(e){
  if(clickCount<5||!e.shiftKey||(e.key!=='a'&&e.key!=='A'))return;

  // Freeze canvas frame
  const imgData=cx.getImageData(0,0,c.width,c.height);
  if(aid)cancelAnimationFrame(aid);

  const txt=document.getElementById('scene-text').cloneNode(true);
  const hnt=document.getElementById('hint').cloneNode(true);
  const isDark=document.body.classList.contains('dark');

  overlay.innerHTML='';

  ['l','r'].forEach(side=>{
    const half=document.createElement('div');
    half.className='half '+side;
    half.style.overflow='hidden';

    // Canvas at 200% width — positions at left:0 (left half) or left:-100% (right half)
    const cv=document.createElement('canvas');
    cv.width=c.width;cv.height=c.height;
    const ctx=cv.getContext('2d');
    ctx.putImageData(imgData,0,0);
    cv.style.cssText='position:absolute;top:0;'+(side==='l'?'left:0;':'left:-100%;')+'width:200%;height:100%;z-index:2;pointer-events:none;';

    // Text at 200% width, centered — overflow:hidden clips the visible portion
    const t=txt.cloneNode(true);
    t.style.cssText='position:absolute;top:50%;left:0;width:200%;text-align:center;z-index:1;pointer-events:none;transform:translateY(-50%);';

    const h=hnt.cloneNode(true);
    h.style.cssText='position:absolute;bottom:8%;left:0;width:200%;text-align:center;z-index:1;pointer-events:none;';

    half.appendChild(cv);
    half.appendChild(t);
    half.appendChild(h);
    half.style.background=isDark?'#2a2a2a':'#fff';
    overlay.appendChild(half);
  });

  aiFrame.classList.add('show');
  document.body.classList.add('split');
});
</script>
</body>
</html>
