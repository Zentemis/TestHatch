<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;cursor:pointer;background:#fff;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;transition:background 1.5s ease}
body.active{background:linear-gradient(135deg,#0a1628 0%,#0d2137 40%,#1a3a5c 70%,#2563eb 100%)}
.container{text-align:center;position:relative;z-index:2}
h1{font-size:3.5rem;font-weight:700;color:#222;transition:all 1.2s cubic-bezier(.4,0,.2,1);letter-spacing:0}
body.active h1{color:#fff;font-family:'Playfair Display',serif;font-size:4.5rem;letter-spacing:2px;text-shadow:0 0 40px rgba(37,99,235,0.5),0 0 80px rgba(37,99,235,0.2)}
.guess{display:inline;transition:opacity 0.8s ease,margin 0.8s ease}
body.active .guess{opacity:0;margin:0;width:0;overflow:hidden}
.period{transition:opacity 0.4s ease}
body.active .period{opacity:0}
.exclaim{opacity:0;display:inline;transition:opacity 0.6s ease 0.6s}
body.active .exclaim{opacity:1;animation:bounce 0.5s ease 1.4s}
@keyframes bounce{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes wobble{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-6px) rotate(-1deg)}75%{transform:translateY(4px) rotate(0.5deg)}}
h1{animation:wobble 4s ease-in-out infinite}
body.active h1{animation:none}
.hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:#aaa;font-size:0.95rem;transition:opacity 1s ease;animation:pulse 2s ease-in-out infinite}
body.active .hint{opacity:0}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
.tagline{opacity:0;transform:translateY(20px);color:rgba(255,255,255,0.8);font-size:1.2rem;margin-top:24px;letter-spacing:1px;transition:all 1s ease 0.8s}
body.active .tagline{opacity:1;transform:translateY(0)}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.shape{position:fixed;border-radius:50%;opacity:0;z-index:0;pointer-events:none;transition:opacity 2s ease}
body.active .shape{opacity:1}
.shape.s1{width:300px;height:300px;border:1px solid rgba(37,99,235,0.15);top:10%;left:5%;animation:drift1 20s ease-in-out infinite}
.shape.s2{width:200px;height:200px;border:1px solid rgba(96,165,250,0.1);bottom:15%;right:8%;animation:drift2 25s ease-in-out infinite}
.shape.s3{width:150px;height:150px;border:1px solid rgba(37,99,235,0.1);top:60%;left:80%;animation:drift3 18s ease-in-out infinite;transform:rotate(45deg);border-radius:0}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,15px)}}
@keyframes drift3{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(20px,-25px)}}
</style>
</head>
<body>
<div class="shape s1"></div>
<div class="shape s2"></div>
<div class="shape s3"></div>
<canvas id="sparkles"></canvas>
<div class="container">
<h1>Hatcher is cool<span class="guess">, I guess</span><span class="period">.</span><span class="exclaim">!</span></h1>
<p class="tagline">Transforming developer workflows</p>
</div>
<div class="hint">click anywhere</div>
<script>
let clicked=false;
document.body.addEventListener('click',function(e){
if(clicked)return;
clicked=true;
document.body.classList.add('active');
burst(e.clientX,e.clientY);
});
const canvas=document.getElementById('sparkles');
const ctx=canvas.getContext('2d');
let particles=[];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);
function burst(x,y){
for(let i=0;i<40;i++){
const angle=Math.random()*Math.PI*2;
const speed=Math.random()*4+2;
particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,decay:Math.random()*0.02+0.008,size:Math.random()*3+1,color:'hsl('+(210+Math.random()*40)+',80%,'+(60+Math.random()*30)+'%)'});
}
}
function animate(){
requestAnimationFrame(animate);
ctx.clearRect(0,0,canvas.width,canvas.height);
particles=particles.filter(p=>p.life>0);
particles.forEach(p=>{
p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.decay;p.vx*=0.99;
ctx.globalAlpha=p.life;
ctx.fillStyle=p.color;
ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
});
ctx.globalAlpha=1;
}
animate();
</script>
</body>
</html>
